name: activ_mobile
description: ACTIV Membership Portal Mobile App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.0.5
  flutter_riverpod: ^2.3.6
  
  # Networking
  dio: ^5.3.2
  http: ^1.1.0
  
  # Authentication
  flutter_secure_storage: ^9.0.0
  
  # UI Components
  cupertino_icons: ^1.0.2
  google_fonts: ^5.1.0
  flutter_svg: ^2.0.7
  
  # Navigation
  go_router: ^10.0.0
  
  # Utilities
  shared_preferences: ^2.2.0
  intl: ^0.18.1
  url_launcher: ^6.1.11
  share_plus: ^7.1.0
  
  # PDF & Documents
  pdf: ^3.10.4
  open_filex: ^4.3.2
  
  # Camera & QR
  mobile_scanner: ^3.3.0
  
  # Maps
  flutter_map: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
