name: Mobile Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: mobile

      - name: Build
        run: npm run build
        working-directory: mobile

      - name: Deploy
        run: echo 'Deploy mobile app here'

